name: Temporary Crash Atlas Release Gate

on:
  pull_request:
    branches:
      - main
    paths:
      - 'ci/v030full.part.*'
      - '.github/workflows/crash-atlas-v030-full.yml'
      - '.github/workflows/crash-atlas-temporary-ci.yml'

permissions:
  contents: read

jobs:
  build:
    if: github.head_ref == 'build/crash-atlas-v0.2.0'
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Reconstruct source archive
        id: reconstruct
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path diagnostics -Force | Out-Null
          try {
            $ErrorActionPreference = 'Stop'
            $chunkNames = @(
              'v030full.part.00',
              'v030full.part.01',
              'v030full.part.02',
              'v030full.part.03',
              'v030full.part.04',
              'v030full.part.05a',
              'v030full.part.05b',
              'v030full.part.06',
              'v030full.part.07',
              'v030full.part.08',
              'v030full.part.09',
              'v030full.part.10',
              'v030full.part.11'
            )
            $parts = @($chunkNames | ForEach-Object { Get-Item (Join-Path 'ci' $_) })
            "Using $($parts.Count) ordered source chunks:" | Tee-Object diagnostics/reconstruct.txt
            foreach ($part in $parts) {
              "  $($part.Name) — $($part.Length) bytes" | Tee-Object diagnostics/reconstruct.txt -Append
            }

            $builder = [System.Text.StringBuilder]::new()
            foreach ($part in $parts) {
              $chunk = [IO.File]::ReadAllText($part.FullName).Trim()
              "Appending $($part.Name): $($chunk.Length) characters" | Tee-Object diagnostics/reconstruct.txt -Append
              [void]$builder.Append($chunk)
            }

            "Combined Base64 length: $($builder.Length)" | Tee-Object diagnostics/reconstruct.txt -Append
            $archiveBytes = [Convert]::FromBase64String($builder.ToString())
            [IO.File]::WriteAllBytes('source.tar.xz', $archiveBytes)
            $archiveHash = (Get-FileHash 'source.tar.xz' -Algorithm SHA256).Hash
            "Decoded archive size: $($archiveBytes.Length) bytes" | Tee-Object diagnostics/reconstruct.txt -Append
            "Decoded archive SHA-256: $archiveHash" | Tee-Object diagnostics/reconstruct.txt -Append

            New-Item -ItemType Directory -Path source -Force | Out-Null
            $listing = & tar -tf source.tar.xz 2>&1
            $listing | Select-Object -First 20 | Tee-Object diagnostics/reconstruct.txt -Append
            if ($LASTEXITCODE -ne 0) {
              throw "Archive listing failed with exit code $LASTEXITCODE."
            }
            & tar -xf source.tar.xz -C source
            if ($LASTEXITCODE -ne 0) {
              throw "Archive extraction failed with exit code $LASTEXITCODE."
            }

            if (-not (Test-Path 'source/SinfarCrashAtlas.sln')) {
              throw 'Source extraction completed but SinfarCrashAtlas.sln is missing.'
            }
            'Reconstruction completed successfully.' | Tee-Object diagnostics/reconstruct.txt -Append
          }
          catch {
            "ERROR: $($_.Exception.Message)" | Tee-Object diagnostics/reconstruct.txt -Append
            $_ | Out-String | Tee-Object diagnostics/reconstruct.txt -Append
            exit 1
          }

      - name: Upload reconstructed source
        if: steps.reconstruct.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: CrashAtlas-Reconstructed-Source
          path: source.tar.xz
          if-no-files-found: error
          retention-days: 7

      - name: Stop after reconstruction failure
        if: steps.reconstruct.outcome == 'failure'
        shell: pwsh
        run: throw 'Source reconstruction failed. See the diagnostic artifact.'

      - name: Restore
        working-directory: source
        run: dotnet restore SinfarCrashAtlas.sln

      - name: Build
        id: compile
        continue-on-error: true
        shell: pwsh
        working-directory: source
        run: |
          cmd /c "dotnet build SinfarCrashAtlas.sln -c Release --no-restore > ..\diagnostics\build.txt 2>&1"
          $code = $LASTEXITCODE
          Get-Content ..\diagnostics\build.txt
          exit $code

      - name: Upload gate diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CrashAtlas-Gate-Diagnostics
          path: diagnostics
          if-no-files-found: error
          retention-days: 7

      - name: Stop after build failure
        if: steps.compile.outcome == 'failure'
        shell: pwsh
        run: throw 'Compilation failed. See CrashAtlas-Gate-Diagnostics.'

      - name: Test
        working-directory: source
        run: dotnet test SinfarCrashAtlas.sln -c Release --no-build --no-restore

      - name: Publish Windows x64
        shell: pwsh
        working-directory: source
        run: |
          dotnet publish src/SinfarCrashAtlas.App/SinfarCrashAtlas.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --no-restore `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishTrimmed=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o ../publish
          Get-FileHash ../publish/SinfarCrashAtlas.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  SinfarCrashAtlas.exe" } |
            Set-Content ../publish/SHA256SUMS.txt -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: SinfarCrashAtlas-v0.3.0-win-x64
          path: publish
          if-no-files-found: error
          retention-days: 7
