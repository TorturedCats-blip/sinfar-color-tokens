name: Temporary Crash Atlas Release Gate

on:
  pull_request:
    branches:
      - main
    paths:
      - 'ci/v030full.part.*'
      - '.github/workflows/crash-atlas-v030-full.yml'
      - '.github/workflows/crash-atlas-temporary-ci.yml'

permissions:
  contents: read

jobs:
  build:
    if: github.head_ref == 'build/crash-atlas-v0.2.0'
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Reconstruct source archive
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $parts = @(Get-ChildItem -Path ci -Filter 'v030full.part.*' | Sort-Object Name)
          Write-Host "Found $($parts.Count) source chunks:"
          foreach ($part in $parts) {
            Write-Host "  $($part.Name) — $($part.Length) bytes"
          }
          if ($parts.Count -ne 12) {
            throw "Expected 12 source chunks; found $($parts.Count)."
          }

          $builder = [System.Text.StringBuilder]::new()
          foreach ($part in $parts) {
            $chunk = [IO.File]::ReadAllText($part.FullName).Trim()
            Write-Host "Appending $($part.Name): $($chunk.Length) characters"
            [void]$builder.Append($chunk)
          }

          Write-Host "Combined Base64 length: $($builder.Length)"
          try {
            $archiveBytes = [Convert]::FromBase64String($builder.ToString())
          }
          catch {
            throw "Base64 reconstruction failed: $($_.Exception.Message)"
          }

          [IO.File]::WriteAllBytes('source.tar.xz', $archiveBytes)
          $archiveHash = (Get-FileHash 'source.tar.xz' -Algorithm SHA256).Hash
          Write-Host "Decoded archive size: $($archiveBytes.Length) bytes"
          Write-Host "Decoded archive SHA-256: $archiveHash"

          New-Item -ItemType Directory -Path source -Force | Out-Null
          & tar -tf source.tar.xz | Select-Object -First 20
          if ($LASTEXITCODE -ne 0) {
            throw "Archive listing failed with exit code $LASTEXITCODE."
          }
          & tar -xf source.tar.xz -C source
          if ($LASTEXITCODE -ne 0) {
            throw "Archive extraction failed with exit code $LASTEXITCODE."
          }

          if (-not (Test-Path 'source/SinfarCrashAtlas.sln')) {
            throw 'Source extraction completed but SinfarCrashAtlas.sln is missing.'
          }

      - name: Restore
        working-directory: source
        run: dotnet restore SinfarCrashAtlas.sln

      - name: Build
        working-directory: source
        run: dotnet build SinfarCrashAtlas.sln -c Release --no-restore

      - name: Test
        working-directory: source
        run: dotnet test SinfarCrashAtlas.sln -c Release --no-build --no-restore

      - name: Publish Windows x64
        shell: pwsh
        working-directory: source
        run: |
          dotnet publish src/SinfarCrashAtlas.App/SinfarCrashAtlas.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --no-restore `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishTrimmed=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o ../publish
          Get-FileHash ../publish/SinfarCrashAtlas.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  SinfarCrashAtlas.exe" } |
            Set-Content ../publish/SHA256SUMS.txt -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: SinfarCrashAtlas-v0.3.0-win-x64
          path: publish
          if-no-files-found: error
          retention-days: 7
